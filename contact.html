<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | ORA</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Office of Research Administration</h1>
    <p>University of Maryland, College Park</p>
  </header>
  <nav>
    <a href="index.html">Home</a>
    <a href="announcements.html">Announcements</a>
    <a href="staff.html">Staff Directory</a>
    <a href="resources.html">Resources</a>
    <a href="contact.html">Contact</a>
  </nav>
  <main>
    <h2 style="margin-bottom:24px;color:#1a1a2e;">Contact Us</h2>
    <div class="hero">
      <form>
        <div style="margin-bottom:16px;">
          <label style="display:block;margin-bottom:6px;font-weight:bold;">Full Name</label>
          <input type="text" placeholder="Your name" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px;">
        </div>
        <div style="margin-bottom:16px;">
          <label style="display:block;margin-bottom:6px;font-weight:bold;">Email</label>
          <input type="email" placeholder="your@email.com" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px;">
        </div>
        <div style="margin-bottom:16px;">
          <label style="display:block;margin-bottom:6px;font-weight:bold;">Message</label>
          <textarea rows="5" placeholder="How can we help?" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px;"></textarea>
        </div>
        <button type="submit" class="btn" style="border:none;cursor:pointer;">Send Message</button>
      </form>
    </div>
  </main>
  <footer>
    <p>© 2026 Office of Research Administration | University of Maryland, College Park</p>
  </footer>
</body>
</html>
